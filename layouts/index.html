{{ define "main" }}
<div class="home-hero">
  <div class="hero-content">
    <h1 class="hero-title">{{ .Site.Params.author.name }}</h1>
    <p class="hero-subtitle">Cloud Architect • Security Professional • Musician</p>
    <p class="hero-description">{{ .Site.Params.description }}</p>
    <div class="hero-buttons">
      <a href="{{ .Site.BaseURL }}about/" class="button primary">About Me</a>
      <a href="{{ .Site.BaseURL }}posts/" class="button secondary">Read Blog</a>
    </div>
  </div>
</div>

<section class="recent-posts">
  <h2 class="section-title">Latest Posts</h2>
  <div class="posts-grid">
    {{ range first 6 (where .Site.RegularPages "Type" "posts") }}
      {{ .Render "summary" }}
    {{ end }}
  </div>
</section>

<style>
.home-hero {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 6rem 2rem;
  text-align: center;
  border-radius: 24px;
  margin-bottom: 4rem;
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
  position: relative;
  overflow: hidden;
}

.home-hero::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
  animation: float 20s infinite ease-in-out;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-30px, -30px); }
}

.hero-content {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
}

.hero-title {
  font-size: clamp(2.5rem, 6vw, 4rem);
  font-weight: 800;
  margin-bottom: 1rem;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
  background: linear-gradient(to right, #fff, #f0f0f0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-size: clamp(1.2rem, 3vw, 1.5rem);
  margin-bottom: 1rem;
  opacity: 0.95;
  font-weight: 500;
}

.hero-description {
  font-size: clamp(1rem, 2vw, 1.1rem);
  margin-bottom: 2rem;
  opacity: 0.9;
  line-height: 1.6;
}

.hero-buttons {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}

.hero-buttons .button {
  padding: 1rem 2.5rem;
  font-size: 1.1rem;
  border-radius: 50px;
  font-weight: 600;
  transition: all 0.3s ease;
  text-decoration: none;
  display: inline-block;
}

.hero-buttons .button.primary {
  background: white;
  color: #667eea;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

.hero-buttons .button.primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 12px rgba(0,0,0,0.15);
}

.hero-buttons .button.secondary {
  background: rgba(255,255,255,0.2);
  color: white;
  border: 2px solid white;
  backdrop-filter: blur(10px);
}

.hero-buttons .button.secondary:hover {
  background: rgba(255,255,255,0.3);
  transform: translateY(-3px);
}

.recent-posts {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 2rem;
}

.section-title {
  font-size: clamp(2rem, 4vw, 2.5rem);
  text-align: center;
  margin-bottom: 3rem;
  position: relative;
  display: inline-block;
  left: 50%;
  transform: translateX(-50%);
}

.section-title::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 4px;
  background: linear-gradient(to right, #667eea, #764ba2);
  border-radius: 2px;
}

.posts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 2rem;
  margin-bottom: 3rem;
}

@media (max-width: 768px) {
  .home-hero {
    padding: 4rem 1.5rem;
    margin-bottom: 2rem;
  }
  
  .posts-grid {
    grid-template-columns: 1fr;
    gap: 1.5rem;
  }
}
</style>
{{ end }}
