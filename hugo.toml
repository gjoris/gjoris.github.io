baseURL = "/"
languageCode = "en-us" # Default language
title = "Geroen Joris Tech Blog"
theme = "DoIt"

enableRobotsTXT = true
enableGitInfo = true
enableEmoji = true

[params]
  description = "A personal, professional, and visually appealing tech blog focusing on AWS, DevSecOps, software architecture, and security."
  images = ["/images/IMG_0007.jpg"] # Using example's avatar, we can change this later

  [params.author]
    name = "Geroen Joris"
    link = "https://github.com/gjoris"

  [params.home]
    [params.home.posts]
      enable = true
      paginate = 10
      sections = ["posts"]

  [params.page]
    hiddenFromHomePage = false
    hiddenFromSearch = false
    dateFormat = "2006-01-02"
    rssFullText = true
    enableLastMod = true
    enableWordCount = true
    enableReadingTime = true
    [params.page.related]
      enable = true

  [params.footer]
    enable = true
    copyright = true
    author = true
    since = 2025 # Set to current year
    hugo = true
    license = '<a rel="license external nofollow noopener noreferrer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'

  [params.social]
    GitHub = "gjoris"
    Linkedin = "geroenjoris"

  [params.header]
    [params.header.title]
      logo = "/images/IMG_0007.jpg"

  [params.search]
    enable = true

  [params.app]
    [params.app.scroll]
      enable = true
    [params.app.css]
      custom = "/css/custom.css"

  [params.seo]
    image = "/images/IMG_0007.jpg" # Default SEO image
    thumbnailUrl = "/images/IMG_0007.jpg" # Default SEO thumbnail

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = true

[taxonomies]
  category = "categories"
  tag = "tags"

[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    title = "Geroen Joris Tech Blog"
    [languages.en.menu]
      [[languages.en.menu.main]]
        name = "Home"
        url = "/"
        weight = 10
      [[languages.en.menu.main]]
        name = "About"
        url = "/about/"
        weight = 20
      [[languages.en.menu.main]]
        name = "Contact"
        url = "/contact/"
        weight = 30
  [languages.nl]
    languageName = "Nederlands"
    weight = 2
    title = "Geroen Joris Tech Blog"
    [languages.nl.menu]
      [[languages.nl.menu.main]]
        name = "Home"
        url = "/nl/"
        weight = 10
      [[languages.nl.menu.main]]
        name = "Over Mij"
        url = "/nl/about/"
        weight = 20
      [[languages.nl.menu.main]]
        name = "Contact"
        url = "/nl/contact/"
        weight = 30

[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[imaging]
  quality = 75
  resampleFilter = "Box"
  bgColor = "#ffffff"
  hint = "photo"